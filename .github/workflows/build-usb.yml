name: Build Read Aloud USB - Lessac High

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "cmd/**"
      - "web/**"
      - "scripts/**"
      - "packaging/**"
      - ".github/workflows/build-usb.yml"
      - "go.mod"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Check out project
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache: false

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: "4.0.23"
          actions-cache-folder: emsdk-cache

      - name: Install host tools
        run: |
          sudo apt-get update
          sudo apt-get install -y bzip2 cmake ninja-build zip

      - name: Show tool versions
        run: |
          go version
          emcc --version
          cmake --version

      - name: Make shell scripts executable
        run: |
          find scripts packaging -type f -name "*.sh" -exec chmod +x {} +

      - name: Build Lessac High USB bundle
        env:
          SHERPA_TAG: v1.13.4
          READALOUD_VERSION: 0.5.1-lessac-narration-export
          VOICE_ID: vits-piper-en_US-lessac-high
          VOICE_DISPLAY_NAME: Lessac High
          MODEL_FILENAME: en_US-lessac-high.onnx
          MODEL_URL: https://github.com/k2-fsa/sherpa-onnx/releases/download/tts-models/vits-piper-en_US-lessac-high.tar.bz2
        run: ./scripts/build_all.sh

      - name: Inspect output
        run: |
          find dist/ReadAloudUSB-Lessac-High -maxdepth 4 -type f -printf '%s %p\n' | sort -n
          sha256sum dist/ReadAloudUSB-Lessac-High.zip

      - name: Upload completed Lessac High USB ZIP
        uses: actions/upload-artifact@v4
        with:
          name: ReadAloudUSB-Lessac-High
          path: dist/ReadAloudUSB-Lessac-High.zip
          if-no-files-found: error
          compression-level: 0
